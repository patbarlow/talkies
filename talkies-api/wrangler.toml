name = "talkies-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# After running `npm run db:create`, paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "talkies"
database_id = "06c316de-9c50-4f26-b6ab-ec7f88a9c2d5"

# Secrets — set via `wrangler secret put <NAME>`, never committed:
#   SESSION_SECRET          (run `openssl rand -hex 32`)
#   GROQ_API_KEY
#   ANTHROPIC_API_KEY
#   RESEND_API_KEY          (from resend.com — sends sign-in codes)
#   RESEND_FROM             (optional custom from-address once your domain is verified)
#   STRIPE_SECRET_KEY
#   STRIPE_WEBHOOK_SECRET
#   STRIPE_PRICE_ID_PRO     (optional until you add paid plans)

# Optional: custom route. Uncomment + add your zone after deploy works on workers.dev.
# [[routes]]
# pattern = "api.yap.app/*"
# zone_name = "yap.app"
